<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EZYPC - Calm PC Buying</title>
    <script>
      // Synchronously apply dark mode before React loads to prevent flash
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Minimal White and Black Theme
              base: '#FFFFFF',
              surface: '#F8F8F8',
              'on-surface': '#000000',
              'on-surface-secondary': '#666666',
              primary: '#000000', 
              'primary-hover': '#333333',

              // Dark theme (Redefined for true premium black)
              'dark-base': '#000000',
              'dark-surface': '#0A0A0A',
              'dark-on-surface': '#FFFFFF',
              'dark-on-surface-secondary': '#A0A0A0',
              'dark-primary': '#FFFFFF',
              'dark-primary-hover': '#E0E0E0',

              accent: '#00F0FF', // Keeping a tiny bit of tech cyan as accent
            },
            fontFamily: {
              sans: ['"Host Grotesk"', 'Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      @font-face {
        font-family: 'Host Grotesk';
        src: url('/fonts/HostGroteskwght-BF65bb091d8052b.ttf') format('truetype');
        font-weight: 100 900;
        font-style: normal;
      }
      @font-face {
        font-family: 'Host Grotesk';
        src: url('/fonts/HostGrotesk-Regular-BF65bb091d50206.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Host Grotesk';
        src: url('/fonts/HostGrotesk-Medium-BF65bb091d2b74a.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'Host Grotesk';
        src: url('/fonts/HostGrotesk-Bold-BF65bb091c5ba6f.otf') format('opentype');
        font-weight: 700;
        font-style: normal;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "ss02", "cv01", "cv02";
      }

      /* Global Text Color Fix for Dark Mode */
      body {
        color: #000000;
      }
      .dark body {
        color: #FFFFFF;
      }

      /* Ensure common text utilities respect dark mode */
      .text-black { color: #000000; }
      .dark .text-black, .dark .text-on-surface { color: #FFFFFF !important; }
      
      .text-on-surface { color: #000000; }
      .dark .text-on-surface { color: #FFFFFF !important; }

      .text-on-surface-secondary { color: #666666; }
      .dark .text-on-surface-secondary { color: #A0A0A0 !important; }

      /* Extreme Dark Mode legible text override (Excludes buttons) */
      .dark h1, .dark h2, .dark h3, .dark h4, .dark p, .dark span, .dark div:not([class*="bg-"]) {
        --tw-text-opacity: 1;
      }

      .dark .text-on-surface:not(button):not([class*="bg-white"]) {
        color: #FFFFFF !important;
      }

      .dark .text-on-surface-secondary {
        color: rgba(255,255,255,0.6) !important;
      }

      /* Make sure buttons keep their intended text-color */
      .dark button.text-black, .dark button.dark\:text-black {
        color: #000000 !important;
      }

      .dark .group-hover\:text-black:hover {
        color: #000000 !important;
      }

      /* Global No-Select to feel like an app */
      body {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        overflow-x: hidden;
      }

      /* Re-enable for interactive/readable elements */
      button, input, textarea, [contenteditable="true"] {
        user-select: auto;
        -webkit-user-select: auto;
      }
      
      h1, h2, h3, .selectable-text {
        user-select: text;
        -webkit-user-select: text;
      }

      /* Noise Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.03;
        z-index: 9999;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.1);
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.1);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.2);
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.2);
      }

      /* Selection */
      ::selection {
        background: rgba(128, 128, 128, 0.2);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.29.2"
  }
}
</script>
</head>
  <body class="bg-base text-on-surface dark:bg-dark-base dark:text-dark-on-surface font-sans transition-colors duration-300">
    <div id="root"></div>
  </body>
</html>
